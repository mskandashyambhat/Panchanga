<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Panchanga</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <section class="card" aria-label="Digital Panchanga card">
        <h1 id="appTitle">Digital Panchanga</h1>

        <div class="controls">
          <div class="field-group">
            <label id="dateLabel" for="dateInput">Select Date</label>
            <input type="date" id="dateInput" />
          </div>
          <div class="field-group">
            <label id="languageLabel" for="languageSelect">Language</label>
            <select id="languageSelect" aria-label="Language selector">
              <option value="en">English</option>
              <option value="hi">Hindi</option>
              <option value="kn">Kannada</option>
              <option value="sa">Sanskrit</option>
            </select>
          </div>
          <button id="loadBtn" type="button">Load Panchanga</button>
        </div>

        <p id="locationInfo" class="info">Detecting location...</p>
        <p id="sourceInfo" class="info muted">Waiting for data...</p>

        <div class="rows" role="table" aria-label="Panchanga details">
          <div class="row"><span id="label-samvatsara">Samvatsara</span><strong id="samvatsara">-</strong></div>
          <div class="row"><span id="label-aayana">Aayana</span><strong id="aayana">-</strong></div>
          <div class="row"><span id="label-ritu">Ritu</span><strong id="ritu">-</strong></div>
          <div class="row"><span id="label-maas">Maas</span><strong id="maas">-</strong></div>
          <div class="row"><span id="label-paksha">Paksha</span><strong id="paksha">-</strong></div>
          <div class="row"><span id="label-tithi">Tithi</span><strong id="tithi">-</strong></div>
          <div class="row"><span id="label-vaasara">Vaasara</span><strong id="vaasara">-</strong></div>
          <div class="row"><span id="label-nakshatra">Nakshatra</span><strong id="nakshatra">-</strong></div>
          <div class="row"><span id="label-yoga">Yoga</span><strong id="yoga">-</strong></div>
          <div class="row"><span id="label-karana">Karana</span><strong id="karana">-</strong></div>
          <div class="row"><span id="label-sunrise">Sunrise</span><strong id="sunrise">-</strong></div>
          <div class="row"><span id="label-sunset">Sunset</span><strong id="sunset">-</strong></div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
